<meta name="description" content="Het Leger des Heils beperkt persoonlijke vrijheid en handhaaft de status quo door te kiezen voor religieuze liefdadigheid boven sociale verandering. 
								  Hoewel wie moet overleven moet hun middelen  gebruiken, mogen we geen illusies hebben over hun motieven.
								  Wie kan, moet investeren in zelfbeheer zoals kraken of Voedsel Geen Bommen, zodat mensen niet afhankelijk blijven.
								  Naast alternatieven voor liefdadigheid moeten we strijden voor een basisinkomen en het einde van structurele ongelijkheid. 
								  Pas door een gelijkwaardige samenleving te bouwen, verdwijnt de macht van en de noodzaak voor liefdadigheidsinstellingen."/>
<title>Geef de voorkeur aan maatschappelijke verandering boven religieuze liefdadigheid</title>
</head>
