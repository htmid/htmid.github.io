        async function renderZip(base64) {
            const status = document.getElementById('status-msg');
            const iframe = document.getElementById('viewer');

            try {
                const binaryString = atob(base64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                const zip = new Compr();
                const contents = await zip.loadAsync(bytes);

                const htmlFileName = Object.keys(contents.files).find(name => name.endsWith('.html'));

                if (!htmlFileName) {
                    throw new Error("No HTML");
                }

                const htmlContent = await contents.files[htmlFileName].async("string");
                iframe.srcdoc = htmlContent;
                status.textContent = `OK`;
                status.className = "status success";

            } catch (err) {
                status.textContent = "Error: " + err.message;
                status.className = "status error";
                console.error(err);
            }
        }
        window.onload = () => renderZip(myBase64Zip);
    </script>
</body>
</html>
