/**
 * Browser-only ZIP extractor from Base64
 * No external dependencies - works in modern browsers
 */

class ZipExtractionError extends Error {
  constructor(message) {
    super(message);
    this.name = 'ZipExtractionError';
  }
}

const ZipExtractor = (function() {
  'use strict';

  // Convert Base64 to Uint8Array
  function base64ToUint8Array(base64) {
    try {
      const cleanBase64 = base64.replace(/^.*;base64,/, '');
      const binaryString = atob(cleanBase64);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes;
    } catch (e) {
      throw new ZipExtractionError('Failed to decode Base64: ' + e.message);
    }
  }

  // Read little-endian values
  function readUint16(view, offset) {
    return view.getUint16(offset, true);
  }

  function readUint32(view, offset) {
    return view.getUint32(offset, true);
  }

  // Decompress using DEFLATE
  async function decompressDeflate(compressedData) {
    if (typeof DecompressionStream !== 'undefined') {
      try {
        const stream = new Blob([compressedData])
          .stream()
          .pipeThrough(new DecompressionStream('deflate'));
        const buffer = await new Response(stream).arrayBuffer();
        return new Uint8Array(buffer);
      } catch (e) {
        console.warn('DecompressionStream failed:', e);
      }
    }

    if (typeof DecompressionStream !== 'undefined') {
      try {
        const stream = new Blob([compressedData])
          .stream()
          .pipeThrough(new DecompressionStream('deflate-raw'));
        const buffer = await new Response(stream).arrayBuffer();
        return new Uint8Array(buffer);
      } catch (e) {
        console.warn('deflate-raw failed:', e);
      }
    }

    throw new ZipExtractionError(
      'DEFLATE decompression not supported in this browser. ' +
      'Use Chrome 80+, Firefox 113+, Safari 17+ or STORE-compressed ZIPs.'
    );
  }

  // Validate file path (prevent zip-slip)
  function isValidPath(filename) {
    if (!filename || filename.trim() === '') return false;
    if (filename.includes('..')) return false;
    if (filename.startsWith('/') || filename.startsWith('\\')) return false;
    return true;
  }

  // Parse ZIP and extract files
  async function extract(base64String) {
    const data = base64ToUint8Array(base64String);
    const view = new DataView(data.buffer);
    const files = {};
    let offset = 0;
    const localFileHeader = 0x04034b50;
    const centralDirHeader = 0x02014b50;
    const endOfCentralDir = 0x06054b50;

    while (offset < data.length - 4) {
      const signature = view.getUint32(offset, true);

      if (signature === localFileHeader) {
        const compressionMethod = readUint16(view, offset + 8);
        const compressedSize = readUint32(view, offset + 18);
        const uncompressedSize = readUint32(view, offset + 22);
        const fileNameLength = readUint16(view, offset + 26);
        const extraFieldLength = readUint16(view, offset + 28);

        const fileName = new TextDecoder('utf-8')
          .decode(data.slice(offset + 30, offset + 30 + fileNameLength));

        if (!isValidPath(fileName)) {
          console.warn('Skipping unsafe file path:', fileName);
          offset += 30 + fileNameLength + extraFieldLength + compressedSize;
          continue;
        }

        const dataStart = offset + 30 + fileNameLength + extraFieldLength;
        const compressedData = data.slice(dataStart, dataStart + compressedSize);

        let fileData;
        if (compressionMethod === 0) {
          fileData = compressedData;
        } else if (compressionMethod === 8) {
          fileData = await decompressDeflate(compressedData);
        } else {
          console.warn('Unsupported compression method:', compressionMethod);
          offset += 30 + fileNameLength + extraFieldLength + compressedSize;
          continue;
        }

        files[fileName] = fileData;
        offset = dataStart + compressedSize;
      }
      else if (signature === centralDirHeader || signature === endOfCentralDir) {
        break;
      }
      else {
        offset++;
      }
    }

    if (Object.keys(files).length === 0) {
      throw new ZipExtractionError('No extractable files found in ZIP archive');
    }

    return files;
  }

  // Extract and decode as text
  async function extractText(base64String, encoding = 'utf-8') {
    const binaryFiles = await extract(base64String);
    const textFiles = {};

    for (const [filename, data] of Object.entries(binaryFiles)) {
      try {
        textFiles[filename] = new TextDecoder(encoding).decode(data);
      } catch (e) {
        textFiles[filename] = '[Binary file: ' + data.length + ' bytes]';
      }
    }

    return textFiles;
  }

  // Get ZIP metadata
  async function getInfo(base64String) {
    const data = base64ToUint8Array(base64String);
    const view = new DataView(data.buffer);
    const files = [];
    let offset = 0;
    const localFileHeader = 0x04034b50;
    const centralDirHeader = 0x02014b50;
    const endOfCentralDir = 0x06054b50;

    while (offset < data.length - 4) {
      const signature = view.getUint32(offset, true);

      if (signature === localFileHeader) {
        const compressionMethod = readUint16(view, offset + 8);
        const compressedSize = readUint32(view, offset + 18);
        const uncompressedSize = readUint32(view, offset + 22);
        const fileNameLength = readUint16(view, offset + 26);
        const extraFieldLength = readUint16(view, offset + 28);

        const fileName = new TextDecoder('utf-8')
          .decode(data.slice(offset + 30, offset + 30 + fileNameLength));

        files.push({
          filename: fileName,
          compressionMethod: compressionMethod,
          compressedSize: compressedSize,
          uncompressedSize: uncompressedSize
        });

        offset += 30 + fileNameLength + extraFieldLength + compressedSize;
      }
      else if (signature === centralDirHeader || signature === endOfCentralDir) {
        break;
      }
      else {
        offset++;
      }
    }

    return {
      totalFiles: files.length,
      files: files
    };
  }

  // Check browser support
  function checkSupport() {
    const support = {
      base64: typeof atob === 'function',
      compressionStream: typeof DecompressionStream !== 'undefined',
      textDecoder: typeof TextDecoder !== 'undefined',
      dataView: typeof DataView !== 'undefined'
    };

    support.overall = support.base64 && support.textDecoder && support.dataView;
    support.deflate = support.compressionStream;

    return support;
  }

  // Public API
  return {
    extract: extract,
    extractText: extractText,
    getInfo: getInfo,
    checkSupport: checkSupport,
    ZipExtractionError: ZipExtractionError
  };
})();

  	<script type='text/javascript'>
				//<![CDATA[
    const support = ZipExtractor.checkSupport();
    document.getElementById('support').innerHTML = ``;

    async function extractZIP() {
      const input = document.getElementById('base64Input').value.trim();
      const output = document.getElementById('output');

      if (!input) {
        output.innerHTML = '';
        return;
      }

      try {
        const files = await ZipExtractor.extractText(input);
        let html = '';

        for (const [filename, content] of Object.entries(files)) {
          html += (content);
        }

        output.innerHTML = html;
		  document.getElementById('viewer').srcdoc=  output.innerHTML;
      } catch (e) {

      }
    }

    async function getInfo() {
      const input = document.getElementById('base64Input').value.trim();
      const output = document.getElementById('output');

      try {
        const info = await ZipExtractor.getInfo(input);
        let html = ``;


        html += '';
        output.innerHTML = html;
      } catch (e) {
        output.innerHTML = '';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function downloadSample() {
      const sampleZIP = createSampleZIP();
      const base64 = btoa(String.fromCharCode(...sampleZIP));
      document.getElementById('base64Input').value = base64;
      alert('Sample ZIP created! Click "Extract Files" to test.');
    }

    function createSampleZIP() {
      const filename = 'test.txt';
      const content = 'Hello from ZIP!';
      const fileNameBytes = new TextEncoder().encode(filename);
      const contentBytes = new TextEncoder().encode(content);

      const localHeader = new Uint8Array([
        0x50, 0x4b, 0x03, 0x04,
        0x0a, 0x00,
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00, 0x00, 0x00,
        ...uint32LE(contentBytes.length),
        ...uint32LE(contentBytes.length),
        ...uint16LE(fileNameBytes.length),
        0x00, 0x00
      ]);

      const centralDir = new Uint8Array([
        0x50, 0x4b, 0x01, 0x02,
        0x0a, 0x00,
        0x0a, 0x00,
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00, 0x00, 0x00,
        ...uint32LE(contentBytes.length),
        ...uint32LE(contentBytes.length),
        ...uint16LE(fileNameBytes.length),
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00,
        0x00, 0x00, 0x00, 0x00,
        0x00, 0x00, 0x00, 0x00
      ]);

      const endOfCentral = new Uint8Array([
        0x50, 0x4b, 0x05, 0x06,
        0x00, 0x00,
        0x00, 0x00,
        0x01, 0x00,
        0x01, 0x00,
        ...uint32LE(centralDir.length + fileNameBytes.length),
        ...uint32LE(localHeader.length + fileNameBytes.length + contentBytes.length),
        0x00, 0x00
      ]);

      return new Uint8Array([
        ...localHeader,
        ...fileNameBytes,
        ...contentBytes,
        ...centralDir,
        ...fileNameBytes,
        ...endOfCentral
      ]);
    }

    function uint16LE(num) {
      return [num & 0xff, (num >> 8) & 0xff];
    }

    function uint32LE(num) {
      return [num & 0xff, (num >> 8) & 0xff, (num >> 16) & 0xff, (num >> 24) & 0xff];
    }
	  
	  //]]>
  </script>
