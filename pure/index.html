function ncolou(angle) {
  // Normalize angle to 0-360 degrees
  angle = angle % 360;
  if (angle < 0) angle += 360;

  // Calculate color channel values based on angle
  const h = angle / 60;
  const i = Math.floor(h);
  const f = h - i;

  const colors = [
    [255, 0, 0], // Red
    [255, 255, 0], // Yellow
    [0, 255, 0], // Green
    [0, 255, 255], // Cyan
    [0, 0, 255], // Blue
    [255, 0, 255], // Magenta
  ];

  let r, g, b;
  switch (i) {
    case 0:
      r = colors[0][0];
      g = colors[0][1] * f + colors[1][1] * (1 - f);
      b = colors[0][2];
      break;
    case 1:
      r = colors[1][0] * (1 - f) + colors[2][0] * f;
      g = colors[1][1];
      b = colors[1][2] * f + colors[2][2] * (1 - f);
      break;
    case 2:
      r = colors[2][0] * (1 - f) + colors[3][0] * f;
      g = colors[2][1];
      b = colors[2][2];
      break;
    case 3:
      r = colors[3][0] * f + colors[4][0] * (1 - f);
      g = colors[3][1] * (1 - f) + colors[4][1] * f;
      b = colors[3][2];
      break;
    case 4:
      r = colors[4][0];
      g = colors[4][1] * (1 - f) + colors[5][1] * f;
      b = colors[4][2] * (1 - f) + colors[5][2] * f;
      break;
    default:
      r = colors[5][0] * (1 - f) + colors[0][0] * f;
      g = colors[5][1];
      b = colors[5][2];
  }

  // Return the RGB string
  return 'rgb('+Math.round(r)+','+Math.round(g)+','+ Math.round(b)+')';
}
