      overflow: hidden; /* Stops browser window from scrolling entirely */

    .nova-studio {
      max-width: 1500px;
      width: 100%;
      height: 100%;
      max-height: 95vh;
      background: rgba(18, 28, 40, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 24px; /* Reduced for smarter boundary fitting */
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .dashboard {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Limits layout contents from breaching borders */
    }

    .media-area {
      flex: 3;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      overflow: hidden;
    }

    .media-stage {
      background: #000000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      flex: 1; /* Instructs video layer to claim remaining gap freely */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    video, audio {
      width: 100%;
      height: 100%;
      max-height: 100%;
      display: block;
      background: #000;
      object-fit: contain;
    }

    video {
      aspect-ratio: 16 / 9;
    }

    .visualizer-container {
      margin-top: 10px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 16px;
      padding: 10px;
      backdrop-filter: blur(4px);
      flex-shrink: 0;
    }

    .viz-canvas {
      width: 100%;
      height: 120px; /* Slimmed down height down to guarantee fitment */
      background: #0a0f1a;
      border-radius: 12px;
      display: block;
    }

    .viz-controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .viz-btn {
      background: rgba(30, 42, 58, 0.95);
      border: none;
      color: #e0e0e0;
      padding: 5px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .viz-btn.active-viz {
      background: #2c7be5;
      color: white;
      box-shadow: 0 0 12px rgba(44,123,229,0.5);
    }

    .control-panel {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(16px);
      margin: 10px 0 0 0;
      border-radius: 20px; /* Rectangular-oval form prevents padding overflow */
      padding: 8px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 1.1rem;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover {
      background: #2c7be5;
      transform: scale(1.03);
    }

    .time-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.75rem;
      background: rgba(0,0,0,0.6);
      padding: 4px 10px;
      border-radius: 32px;
      color: #2c7be5;
      font-weight: bold;
    }

    .time-group span {
      color: #ffffff;
    }

      height: 4px;

      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      min-width: 60px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #2c7be5;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px #2c7be5;
    }

      border-left: 1px solid rgba(255,255,255,0.1);
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
      overflow-y: auto; /* Standardizes scrolling to isolate dashboard */

      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 12px;
      flex-shrink: 0;
    }

      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100px;
    }

      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      color: #8db2e5;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;

      border-radius: 14px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      color: #ccc;
      font-size: 0.8rem;
    }

    .upload-area:hover {
      border-color: #2c7be5;
      background: rgba(44,123,229,0.1);
      color: white;
    }

    #fileInput {
      display: none;
    }

    .queue-list {
      max-height: 140px; /* Prevent long lists from sizing windows out */
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .queue-item {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.1s;
      border: 1px solid transparent;
      color: #ddd;
      font-size: 0.75rem;
    }

    .queue-item.active-now {
      background: rgba(44, 123, 229, 0.3);
      border-color: #2c7be5;
    }

    .queue-item:hover {
      background: rgba(44,123,229,0.4);

      border-radius: 12px;

      text-align: center;

        this.canvas.addEventListener("dragleave",this.dragLeave.bind(this),false);
        this.canvas.addEventListener("drop",this.execDrop.bind(this),false);
        this.canvas.addEventListener("click",this.click.bind(this),false);
        this.canvas.addEventListener("mousedown",this.pointerdown.bind(this),false);
        this.canvas.addEventListener("mousemove",this.pointermove.bind(this),false);
        this.canvas.addEventListener("touchstart",this.pointerdown.bind(this),false);
        this.canvas.addEventListener("touchend",this.pointerup.bind(this),false);
        this.canvas.addEventListener("touchcancel",this.pointerup.bind(this),false);
        this.canvas.addEventListener("touchmove",this.pointermove.bind(this),false);
      }
    },

      const maxTick = midiSynth.maxTick || 1;
      const progress = currentTick / maxTick;
      progressBar.value = progress * 100;
      const currentSec = progress * midiDuration;
      currentTimeSpan.innerText = formatTime(currentSec);
    }
  }

  function playMidi() {
    if (midiSynth && midiSynth.song) {
      // Re-hook events if needed (in case they were lost)
      hookMidiSynthEvents();
      
      midiSynth.playMIDI();
      isMidiPlaying = true;
      globalStatus.innerText = '🎵 MIDI Playing + Visualizer Active';
      playBtn.innerText = '⏸';
      
      if (midiProgressInterval) clearInterval(midiProgressInterval);
      midiProgressInterval = setInterval(() => {
        updateMidiProgress();
        if (midiSynth && !midiSynth.playing && isMidiPlaying) {
          isMidiPlaying = false;
          playBtn.innerText = '▶';
          progressBar.value = 100;
          currentTimeSpan.innerText = formatTime(midiDuration);
          
          if (repeatMode === 'one') {
            if (midiSynth.locateMIDI) midiSynth.locateMIDI(0);
            midiSynth.playMIDI();
            isMidiPlaying = true;
          } else if (repeatMode === 'all') {
            playNext();
          }
          clearInterval(midiProgressInterval);
          midiProgressInterval = null;
        }
      }, 100);
      
      addConsoleLog("MIDI playback started - visualizer should show note activity", "success");
    }
  }

  function pauseMidi() {
    if (midiSynth && midiSynth.playing) {
      midiSynth.stopMIDI();
      isMidiPlaying = false;
      globalStatus.innerText = 'MIDI Paused';
      playBtn.innerText = '▶';
      addConsoleLog("MIDI playback paused");
    }
  }

  function stopMidi() {
    if (midiSynth) {
      midiSynth.stopMIDI();
      isMidiPlaying = false;
      globalStatus.innerText = 'MIDI Stopped';
      playBtn.innerText = '▶';
      progressBar.value = 0;
      currentTimeSpan.innerText = '0:00';
      midiNoteActivity.fill(0);
      addConsoleLog("MIDI playback stopped");
    }
    if (midiProgressInterval) { clearInterval(midiProgressInterval); midiProgressInterval = null; }
  }

  // ========== QUEUE & MEDIA HANDLING ==========
  function loadMedia(index) {
    if (index < 0 || index >= mediaQueue.length) {
      if (mediaQueue.length === 0) return;
      if (repeatMode === 'all') index = 0;
      else return;
    }
    currentIndex = index;
    const item = mediaQueue[currentIndex];
    if (!item) return;
    
    if (isMidiPlaying) stopMidi();
    mediaElement.style.display = 'block';
    midiNoteActivity.fill(0);
    
    if (item.type === 'midi') {
      mediaElement.style.display = 'none';
      if (item.arrayBuffer) {
        loadMidiFile(item.arrayBuffer, item.title);
        playMidi();
      } else if (item.src) {
        fetch(item.src).then(res => res.arrayBuffer()).then(buf => {
          loadMidiFile(buf, item.title);
          playMidi();
        }).catch(e => addConsoleLog(`MIDI fetch failed: ${e.message}`, "error"));
      }
      updateQueueUI();
      return;
    }
    
    if (item.blobUrl) mediaElement.src = item.blobUrl;
    else mediaElement.src = item.src;
    mediaElement.load();
    mediaElement.play().catch(e => addConsoleLog(`Autoplay blocked: ${e.message}`));
    updateQueueUI();
    
    mediaElement.addEventListener('loadedmetadata', () => {
      durationSpan.innerText = formatTime(mediaElement.duration);
    }, { once: true });
    
    setTimeout(() => {
      if (audioContextViz && audioContextViz.state === 'suspended') resumeAudioContext();
      else if (!audioContextViz) setupVisualizer();
    }, 100);
  }

  function playNext() {
    if (mediaQueue.length === 0) return;
    let next = currentIndex + 1;
    if (next >= mediaQueue.length) {
      if (repeatMode === 'all') next = 0;
      else return;
    }
    currentIndex = next;
    loadMedia(currentIndex);
  }

  function playPrev() {
    if (mediaQueue.length === 0) return;
    let prev = currentIndex - 1;
    if (prev < 0) {
      if (repeatMode === 'all') prev = mediaQueue.length - 1;
      else return;
    }
    currentIndex = prev;
    loadMedia(currentIndex);
  }

  function addMediaToQueue(file) {
    const isMidi = file.type.includes('midi') || file.name.endsWith('.mid') || file.name.endsWith('.midi');
    const url = URL.createObjectURL(file);
    const item = {
      title: file.name,
      src: url,
      blobUrl: url,
      type: isMidi ? 'midi' : (file.type.startsWith('video') ? 'video' : 'audio'),
    };
    if (isMidi) {
      const reader = new FileReader();
      reader.onload = (e) => {
        item.arrayBuffer = e.target.result;
        if (mediaQueue.length === 1 && currentIndex === 0 && !mediaElement.src) loadMedia(0);
      };
      reader.readAsArrayBuffer(file);
    }
    mediaQueue.push(item);
    if (mediaQueue.length === 1) { currentIndex = 0; loadMedia(0); }
    updateQueueUI();
    globalStatus.innerText = `📁 Added: ${file.name}`;
    addConsoleLog(`Added to queue: ${file.name} (${item.type})`);
  }

  function updateQueueUI() {
    if (!queueContainer) return;
    if (mediaQueue.length === 0) {
      queueContainer.innerHTML = '<div style="color:#aaa; text-align:center;">No files in queue</div>';
      return;
    }
    queueContainer.innerHTML = '';
    mediaQueue.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'queue-item' + (idx === currentIndex ? ' active-now' : '');
      div.innerHTML = `<div style="display:flex; gap:8px; align-items:center; width:100%;"><span>${item.type === 'midi' ? '🎹' : (item.type === 'video' ? '🎬' : '🎵')}</span><div style="flex:1;"><strong style="font-size:0.8rem;">${item.title.substring(0, 40)}</strong><br><small>${item.type.toUpperCase()}</small></div></div>`;
      div.addEventListener('click', () => { currentIndex = idx; loadMedia(currentIndex); });
      queueContainer.appendChild(div);
    });
  }

  // ========== EVENT LISTENERS ==========
  mediaElement.addEventListener('play', async () => {
    playBtn.innerText = '⏸';
    await resumeAudioContext();
  });
  mediaElement.addEventListener('pause', () => playBtn.innerText = '▶');
  mediaElement.addEventListener('ended', () => { if (repeatMode === 'one') { mediaElement.currentTime = 0; mediaElement.play(); } else playNext(); });
  
  mediaElement.addEventListener('timeupdate', () => {
    if (mediaElement.duration && !isNaN(mediaElement.duration)) {
      progressBar.value = (mediaElement.currentTime / mediaElement.duration) * 100;
      currentTimeSpan.innerText = formatTime(mediaElement.currentTime);
      durationSpan.innerText = formatTime(mediaElement.duration);
    }
  });
  
  progressBar.addEventListener('input', (e) => {
    if (mediaQueue[currentIndex]?.type === 'midi' && midiSynth?.song) {
      const seek = e.target.value / 100;
      const seekTick = seek * (midiSynth.maxTick || 1);
      if (midiSynth.locateMIDI) midiSynth.locateMIDI(seekTick);
      if (!isMidiPlaying && midiSynth.song) { midiSynth.playMIDI(); isMidiPlaying = true; }
    } else {
      const seek = (e.target.value / 100) * mediaElement.duration;
      if (!isNaN(seek)) mediaElement.currentTime = seek;
    }
  });
  
  speedSlider.addEventListener('input', () => { mediaElement.playbackRate = parseFloat(speedSlider.value); speedVal.innerText = mediaElement.playbackRate.toFixed(2) + 'x'; });
  volumeControl.addEventListener('input', () => { mediaElement.volume = volumeControl.value; });
  
  let mutedFlag = false;
  volumeBtn.addEventListener('click', () => { mutedFlag = !mutedFlag; mediaElement.muted = mutedFlag; volumeBtn.innerText = mutedFlag ? '🔇' : '🔊'; });
  
  playBtn.addEventListener('click', () => {
    if (mediaQueue[currentIndex]?.type === 'midi') {
      if (midiSynth?.song) { if (isMidiPlaying) pauseMidi(); else playMidi(); }
    } else {
      if (mediaElement.paused) mediaElement.play();
      else mediaElement.pause();
    }
  });
  
  stopBtn.addEventListener('click', () => {
    if (mediaQueue[currentIndex]?.type === 'midi') stopMidi();
    else { mediaElement.pause(); mediaElement.currentTime = 0; }
  });
  
  prevBtn.addEventListener('click', playPrev);
  nextBtn.addEventListener('click', playNext);
  
  repeatBtn.addEventListener('click', () => {
    if (repeatMode === 'none') { repeatMode = 'all'; repeatBtn.innerText = '🔁 All'; }
    else if (repeatMode === 'all') { repeatMode = 'one'; repeatBtn.innerText = '🔂 One'; }
    else { repeatMode = 'none'; repeatBtn.innerText = '🔁 Off'; }
    addConsoleLog(`Repeat mode: ${repeatMode}`);
  });
  
  fullscreenBtn.addEventListener('click', () => {
    const stage = document.getElementById('mediaStage');
    if (!document.fullscreenElement) stage.requestFullscreen().catch(e => {});
    else document.exitFullscreen();
  });
  
  uploadTrigger.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => { Array.from(e.target.files).forEach(f => addMediaToQueue(f)); fileInput.value = ''; });
  clearQueueBtn.addEventListener('click', () => { mediaQueue = []; currentIndex = 0; mediaElement.src = ''; stopMidi(); updateQueueUI(); globalStatus.innerText = 'Queue cleared'; addConsoleLog("Queue cleared"); });
  shuffleQueueBtn.addEventListener('click', () => {
    for (let i = mediaQueue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [mediaQueue[i], mediaQueue[j]] = [mediaQueue[j], mediaQueue[i]];
    }
    currentIndex = 0; updateQueueUI(); if (mediaQueue.length) loadMedia(0);
    addConsoleLog("Queue shuffled");
  });
  
  document.getElementById('loadMidiSynthBtn').addEventListener('click', () => { initMidiSynth(); });
  document.getElementById('stopMidiSynthBtn').addEventListener('click', () => { stopMidi(); });
  
  document.getElementById('loadMidiUrlBtn').addEventListener('click', () => {
    const url = document.getElementById('midiUrlInput').value.trim();
    if (url) {
      addConsoleLog(`Loading MIDI from URL: ${url}`);
      fetch(url).then(res => res.arrayBuffer()).then(buf => {
        mediaQueue.push({ title: url.split('/').pop() || 'MIDI URL', src: url, type: 'midi', arrayBuffer: buf });
        updateQueueUI();
        if (mediaQueue.length === 1) loadMedia(0);
        globalStatus.innerText = 'MIDI URL added to queue';
        addConsoleLog("MIDI URL loaded successfully", "success");
      }).catch(e => { 
        globalStatus.innerText = 'Failed to load MIDI URL';
        addConsoleLog(`Failed to load MIDI URL: ${e.message}`, "error");
      });
    }
  });
  
  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => { e.preventDefault(); Array.from(e.dataTransfer.files).forEach(f => addMediaToQueue(f)); });
  
  document.querySelectorAll('.viz-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.viz-btn').forEach(b => b.classList.remove('active-viz'));
      btn.classList.add('active-viz');
      currentViz = btn.getAttribute('data-viz');
      if (currentViz === 'spectrum') spectrogramHistory = [];
      addConsoleLog(`Visualizer mode: ${currentViz}`);
    });
  });
  
  // ========== INITIALIZATION ==========
  addConsoleLog("NOVA STUDIO v2.0 - Starting up...");
  setupVisualizer();
  animateVisualizer();
  document.querySelector('[data-viz="bars"]').classList.add('active-viz');
  
  // Wait for WebAudioSynth to be available
  setTimeout(() => {
    if (typeof WebAudioSynth !== 'undefined') {
      initMidiSynth();
      addConsoleLog("WebAudioSynth library detected and initialized", "success");
    } else {
      document.getElementById('midiStatusMsg').innerHTML = '⚠️ WebAudioSynth library loaded - synth.js found';
      addConsoleLog("WebAudioSynth library is available", "success");
      initMidiSynth();
    }
  }, 500);
  
  addConsoleLog("✅ Ready! Upload audio/MIDI files and click PLAY", "success");
  addConsoleLog("🎨 MIDI visualizer shows piano roll with note activity", "success");
</script>
