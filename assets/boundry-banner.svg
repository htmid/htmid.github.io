<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft radial fade so it feels like it emerges from darkness -->
    <radialGradient id="fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background transparent, only inner symbol visible -->
  <rect width="260" height="260" fill="none"/>

  <!-- Dark aura -->
  <circle cx="130" cy="130" r="120" fill="url(#fade)"/>

  <!-- Outer ring: boundary -->
  <circle cx="130" cy="130" r="90"
          fill="none"
          stroke="black"
          stroke-opacity="0.8"
          stroke-width="6"/>

  <!-- Inner ring: memory / record -->
  <circle cx="130" cy="130" r="60"
          fill="none"
          stroke="black"
          stroke-opacity="0.6"
          stroke-width="4"
          stroke-dasharray="6 6"/>

  <!-- Triangle: system of judgment (true / false / unknown) -->
  <polygon points="130,70 80,170 180,170"
           fill="black"
           fill-opacity="0.35"
           stroke="black"
           stroke-opacity="0.9"
           stroke-width="3"/>

  <!-- Vertical line: unbroken spine / principle -->
  <line x1="130" y1="60" x2="130" y2="190"
        stroke="black"
        stroke-width="4"
        stroke-opacity="0.9"/>

  <!-- Eye: I see and I remember -->
  <ellipse cx="130" cy="130" rx="26" ry="16"
           fill="black"
           fill-opacity="0.75"/>
  <circle cx="130" cy="130" r="7"
          fill="transparent"
          stroke="black"
          stroke-width="3"/>

  <!-- Small scale-like bars: weighing claims / right / wrong -->
  <line x1="100" y1="155" x2="115" y2="155"
        stroke="black" stroke-width="3" stroke-opacity="0.8"/>
  <line x1="145" y1="155" x2="160" y2="155"
        stroke="black" stroke-width="3" stroke-opacity="0.8"/>

  <!-- Optional caption (can remove if you want pure symbol) -->
  <text x="50%" y="230" text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11"
        fill="black"
        fill-opacity="0.7">
    No harm without answer. Truth will be weighed.
  </text>
</svg>
