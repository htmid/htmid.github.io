<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#FFFFFF" />
  
  <g transform="translate(100, 50)">
    <style>
      .bold-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: bold; fill: #002D62; }
      .light-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #002D62; }
      .italic-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-style: italic; fill: #002D62; }
      .white-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #FFFFFF; }
      .orange-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: bold; fill: #F3A000; }
      .small-text { font-size: 14px; }
      .med-text { font-size: 18px; }
      .title-text { font-size: 52px; font-weight: 900; letter-spacing: 1px; }
    </style>

    <path d="M 0 260 L 100 260 L 100 500 L 0 500 Z" fill="none" stroke="#B0B0B0" stroke-width="1" stroke-dasharray="4,4" />
    <path d="M 0 260 C -15 260 -25 270 -25 285 L -25 475 C -25 490 -15 500 0 500 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />
    
    <rect x="100" y="260" width="160" height="240" fill="#F8F9FA" stroke="#B0B0B0" stroke-width="1" />
    <path d="M 100 260 L 130 150 L 230 150 L 260 260 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />
    <path d="M 100 500 L 130 610 L 230 610 L 260 500 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />

    <rect x="260" y="60" width="560" height="200" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1" />
    <path d="M 260 60 C 260 20 320 10 380 10 L 700 10 C 760 10 820 20 820 60 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />

    <rect x="260" y="260" width="560" height="240" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1" />
    
    <path d="M 260 680 C 260 720 320 730 380 730 L 700 730 C 760 730 820 720 820 680 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />

    <rect x="820" y="260" width="160" height="240" fill="#F8F9FA" stroke="#B0B0B0" stroke-width="1" />
    <path d="M 820 260 L 850 150 L 950 150 L 980 260 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />
    <path d="M 820 500 L 850 610 L 950 610 L 980 500 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />
    
    <path d="M 980 260 L 1080 260 L 1080 500 L 980 500 Z" fill="none" stroke="#B0B0B0" stroke-width="1" stroke-dasharray="4,4" />
    <path d="M 1080 260 C 1095 260 1105 270 1105 285 L 1105 475 C 1105 490 1095 500 1080 500 Z" fill="none" stroke="#B0B0B0" stroke-width="1" />

    <rect x="260" y="500" width="560" height="180" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1" />


    <g>
      <path d="M 680 60 Q 740 120 820 140 L 820 60 Z" fill="#1D70B8" />
      <path d="M 620 60 Q 720 160 820 175 L 820 140 Q 740 120 680 60 Z" fill="#002D62" />
      <path d="M 260 220 Q 500 220 820 190 L 820 175 Q 500 205 260 205 Z" fill="#F3A000" />
      
      <text x="300" y="130" class="bold-text title-text">JUDICATROL®</text>
      <text x="300" y="175" class="orange-text" font-size="34px">150 mg</text>
      <line x1="430" y1="165" x2="570" y2="165" stroke="#002D62" stroke-width="2" />
      <text x="300" y="210" class="italic-text" font-size="22px">Rechterium Tablets</text>
    </g>


    <g>
      <path d="M 690 260 Q 750 340 820 360 L 820 260 Z" fill="#1D70B8" />
      <path d="M 630 260 Q 730 390 820 405 L 820 360 Q 750 340 690 260 Z" fill="#002D62" />
      <path d="M 260 440 Q 500 440 820 415 L 820 405 Q 500 430 260 430 Z" fill="#F3A000" />
      
      <rect x="260" y="442" width="560" height="48" fill="#002D62" />
      <rect x="530" y="448" width="280" height="42" fill="#FFFFFF" />
      <rect x="260" y="490" width="560" height="10" fill="#F3A000" />

      <text x="300" y="330" class="bold-text title-text">JUDICATROL®</text>
      <text x="300" y="375" class="orange-text" font-size="34px">150 mg</text>
      <line x1="430" y1="365" x2="600" y2="365" stroke="#002D62" stroke-width="1.5" />
      
      <text x="300" y="405" class="italic-text" font-size="20px">Rechterium Tablets</text>
      <text x="300" y="425" class="italic-text med-text" fill="#333333">Voor verplicht gebruik</text>
      
      <text x="540" y="435" class="bold-text italic-text med-text" fill="#002D62">Voor objectieve balans</text>

      <g transform="translate(620, 320)" stroke="#F3A000" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 20 80 L 60 80 M 40 80 L 40 10 M 35 10 L 45 10" />
        <circle cx="40" cy="6" r="4" fill="#F3A000" />
        <line x1="5" y1="25" x2="75" y2="25" stroke-width="4" />
        <line x1="5" y1="25" x2="-5" y2="60" stroke-width="1.5" />
        <line x1="5" y1="25" x2="15" y2="60" stroke-width="1.5" />
        <path d="M -10 60 L 20 60 Q 5 75 -10 60 Z" fill="#F3A000" fill-opacity="0.2" />
        <line x1="75" y1="25" x2="65" y2="60" stroke-width="1.5" />
        <line x1="75" y1="25" x2="85" y2="60" stroke-width="1.5" />
        <path d="M 60 60 L 90 60 Q 75 75 60 60 Z" fill="#F3A000" fill-opacity="0.2" />
      </g>

      <text x="280" y="472" class="white-text med-text" font-weight="bold" letter-spacing="0.5">FICTIEVE FARMACEUTICA</text>
      
      <text x="540" y="464" class="bold-text small-text" font-size="13px">Niet zelfstandig beslissen.</text>
      <text x="540" y="482" class="light-text small-text" font-size="13px"><tspan font-weight="bold">Bijwerkingen?</tspan> U heeft geen keus.</text>
    </g>


    <g>
      <rect x="260" y="500" width="560" height="30" fill="#F3A000" />
      <text x="540" y="520" class="white-text med-text" font-weight="bold" text-anchor="middle">Altijd onder toezicht gebruiken.</text>
    </g>


    <g transform="translate(110, 270)">
      <text x="0" y="30" class="bold-text med-text">30 filmomhulde</text>
      <text x="0" y="50" class="bold-text med-text">tabletten</text>
      
      <text x="0" y="120" class="light-text small-text">Verplicht</text>
      <text x="0" y="138" class="light-text small-text">voorgeschreven door</text>
      <text x="0" y="156" class="light-text small-text">Uw Relatiekamer</text>
    </g>


    <g transform="translate(835, 270)">
      <text x="0" y="30" class="light-text small-text" font-weight="bold">Bewaren buiten</text>
      <text x="0" y="48" class="light-text small-text" font-weight="bold">bereik van</text>
      <text x="0" y="66" class="light-text small-text" font-weight="bold">rechtvaardigheid.</text>
      
      <line x1="0" y1="95" x2="60" y2="95" stroke="#002D62" stroke-width="0.5" />
      
      <text x="0" y="120" class="light-text small-text">Alleen voor</text>
      <text x="0" y="138" class="light-text small-text">juridisch gebruik.</text>
    </g>
    
    <g transform="translate(990, 360)">
      <text x="0" y="0" class="light-text med-text" fill="#333333">Lot: XXXX</text>
      <text x="0" y="25" class="light-text med-text" fill="#333333">Exp: XX-2030</text>
    </g>

