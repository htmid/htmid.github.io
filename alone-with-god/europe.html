<canvas id="canvassd" width="350" height="350" style="width:100%;height:100%;position:fixed;left:0%;top:0%;border-radius:0%;opacity:.15"></canvas>
<script>
var speed=100;
var canvasss = document.getElementById("canvassd");
var ctxss = canvasss.getContext('2d');
var WIDTH = canvasss.width;
var HEIGHT = canvasss.height;
var N_STATES = 20;
var pixels = ctxss.getImageData(0, 0, WIDTH, HEIGHT);

var state0 = new Uint8Array(WIDTH * HEIGHT);
var state1 = new Uint8Array(WIDTH * HEIGHT);
function getPixel(imgData, index) {
  var i = index*4, d = imgData.data
  return [d[i],d[i+1],d[i+2],d[i+3]] // Returns array [R,G,B,A]
}
// Step forward in the simulation
var step = function() {
  for (var r = 0; r < HEIGHT; r++) {
    for (var c = 0; c < WIDTH; c++) {
      var cur = state0[r * WIDTH + c];
      var target = (cur + 1) % N_STATES;
      var next = cur;
      
      // Check the surrounding 8 cells
      for (var dr = -2; dr < 2; dr++) {
        for (var dc = -2; dc < 2; dc++) {
          if (dr === 0 && dc === 0) continue;
          if (state0[(r + dr) * WIDTH + (c + dc)] === target) {
            next = target;
          }
        }
      }
      
      state1[r * WIDTH + c] = next;
    }
  }
  
  var temp = state0;
  state0 = state1;
  state1 = temp;
};
/*
// Makes moving the mouse over the canvas
// cause cells to be randomized
canvas.addEventListener('mousemove', function(ev) {
  var r = ev.offsetY;
  var c = ev.offsetX;
  for (var dr = -10; dr <= 10; dr++) {
    for (var dc = -10; dc <= 10; dc++) {
      state0[(r + dr)*HEIGHT + (c + dc)] = Math.floor(Math.random() * N_STATES);
    }
  }
});

*/


var c = document.getElementById("canvassd");
var ctxss = c.getContext("2d");
var imgsss = document.getElementById("imga");
ctxss.drawImage(imgsss, 0, Math.round(110*350/500), c.width, c.height);
var state00 = ctxss.getImageData(0, 0, c.width, c.height);



// Draw the state to the canvas, mapping states to RGB values
var draw = function() {
  for (var i = 0; i < WIDTH*HEIGHT; i++) {
    var s = state1[i];
    var offset = i * 4;
    pixels.data[offset + 0] = 255 * (s / N_STATES);
    pixels.data[offset + 1] = 255 * (s / N_STATES);
    pixels.data[offset + 2] = 255 * (s / N_STATES);
    pixels.data[offset + 3] = 255;
  }
  ctxss.putImageData(pixels, 0, 0);
};


// Randomize initial grid state
for (var r = 0; r < HEIGHT; r++) {
  for (var c = 0; c < WIDTH; c++) {





    state0[r*WIDTH + c] = Math.floor(Math.random() * N_STATES);
  }
}













// Animation loop
function tick() {
  step();
  draw();
  setTimeout('tick()', (speed*8));
}
tick();






function flsjk(){

// Randomize initial grid state
for (var r = 0; r < HEIGHT; r++) {
  for (var c = 0; c < WIDTH; c++) {




dsd=getPixel(state00, (r*WIDTH + c))


if((dsd[0]+dsd[1]+dsd[2]+dsd[3])==255){
    state0[r*WIDTH + c] = Math.floor(1 * N_STATES);
  }

}
}


setTimeout("flsjk()", 10000);
}
flsjk();

</script>
