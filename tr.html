function createCube() {

	df=document.getElementById('cont');
	 rec=df.getBoundingClientRect();

    var p0 = document.createElement('div');
    p0.id = 'pp0';
    p0.style.position = 'absolute';

    	
    p0.style.left = Math.floor((rec.width/2)-( Math.floor(rec.width/rec.height*.5*100*rec.height/100)))+"px";
    p0.style.top = (Math.floor(rec.height/2)-(Math.floor(rec.width/rec.height*.5*100*rec.height/100)))+"px";

    p0.style.height = Math.floor(rec.width/rec.height*100*rec.height/100)+"px";
    document.body.appendChild(p0);

    for (var i = 1; i <= 6; i++) {
        var plane = document.createElement('div');
        plane.id = 'pd' + i;
        plane.style.position = 'absolute';
        plane.style.width = Math.floor(rec.width/rec.height*100*rec.height/100)+"px";
        plane.style.height = Math.floor(rec.width/rec.height*100*rec.height/100)+"px";;

    d5.style.transform = 'rotateY(-90deg) translateZ('+Math.floor(rec.width/rec.height*50*rec.height/100)+'px)';
    var d6 = document.getElementById('pd6');
    d6.style.transform = 'rotateY(90deg) translateZ('+Math.floor(rec.width/rec.height*50*rec.height/100)+'px)';
}


function rotateCube(p1, p2, p3) {
    var p0 = document.querySelector('#pp0');
    p0.style.transformStyle = 'preserve-3d';
    p0.style.transformOrigin = 'center center';
    p0.style.transform = `rotateX(${p1}deg) rotateY(${p2}deg) rotateZ(${p3}deg)`;
}

function steps(){
	if(dtttr==1){
		maalf=1;
	}
	else{
		maalf=0;
	}
	rotateCube(tel,tel2,tel3);
	tel+=(.18*dtrx*maalf);
	tel2+=(.18*dtry*maalf);
	tel3+=(.18*dtrz*maalf);
	if(Math.random()<.0021){
		dtrx*=-1;
	}
	if(Math.random()<.0021){
		dtry*=-1;
	}
	if(Math.random()<.002){
		dtrz*=-1;
	}
	if(Math.random()<.0016){
		dtttr=-1;
	}
	if(Math.random()<.0132){
		dtttr=1;
	}	
	if(document.getElementById('div2')){
		
	}
	setTimeout("steps()", 100);
}
