        async function renderZip(base64) {
            const status = document.getElementById('status-msg');
            const iframe = document.getElementById('viewer');

            try {
                // 2. Decode Base64 to a Binary Array
                const binaryString = atob(base64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // 3. Initialize JSZip and load the data
                const zip = new JSZip();
                const contents = await zip.loadAsync(bytes);

                // 4. Find the first .html file inside the ZIP
                const htmlFileName = Object.keys(contents.files).find(name => name.endsWith('.html'));

                if (!htmlFileName) {
                    throw new Error("No HTML file found inside the ZIP archive.");
                }

                // 5. Extract the HTML string
                const htmlContent = await contents.files[htmlFileName].async("string");

                // 6. Inject into iframe using srcdoc 
                // This fixes the "null origin/port" error by keeping it in the same context
                iframe.srcdoc = htmlContent;

                status.textContent = `Successfully rendered: ${htmlFileName}`;
                status.className = "status success";

            } catch (err) {
                status.textContent = "Error: " + err.message;
                status.className = "status error";
                console.error(err);
            }
        }

        // Initialize on load
        window.onload = () => renderZip(myBase64Zip);
    </script>
