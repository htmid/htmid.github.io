<canvas id='canvas' style='width:104%;height:104%;z-index:-3000;position:fixed;left:-2%;top:-2%' width=512 height=512></canvas>
<img id='img' style='bottom:-25%;right:0;position:fixed;width:50%;height:50%; transform-origin: 50% 50%;' src='starship.png'>
<img id='imga' style='top:5%;right:30%;position:fixed;width:5%;height:5%; transform-origin: 50% 50%;' src='alen3spits.png'>


<script>

function rota(){
rtel+=1;
document.getElementById('img').style.right=(40+(40*Math.sin(rtel/15)))+"%";

setTimeout("rota()", 166);
}


var rtel=0;
rota();




function rota2(){
rtel2+=5;

document.getElementById('imga').style.transform = 'rotate('+rtel2+'deg)';
document.getElementById('imga').style.right = 60+(20*Math.sin(rtel2/14))+"%";
document.getElementById('imga').style.top = 8+(4*Math.cos((rtel2+rtel)/14))+"%";

document.getElementById('imga').style.width = 5+(4*Math.cos((rtel2-rtel)/14))+"%";

setTimeout("rota2()", 50);
}


var rtel2=0;
rota2();



var wh=512;
var lays=1;

var unit=[[-0.939, 0.88, -0.939],
          [0.88,  0.4 ,  0.88],
          [-0.939, 0.88, -0.939]
     ];



var grid=new Array();
for(t=0;t<wh;t++){
	grid[t]=[];
}

for(t=0;t<wh;t++){
	for(u=0;u<wh;u++){
		grid[t][u]=-1+(2*Math.random());
	}
}
var gridx;


function conv(){
	gridx=new Array();
	for(t=0;t<wh;t++){
		gridx[t]=[];
	}
	for(t=0;t<wh;t++){
		for(u=0;u<wh;u++){
			gridx[t][u]=grid[t][u];
		}
	}
	for(x=0;x<(wh-0);x++){
		for(y=0;y<(wh-0);y++){
			//The Convolution
			s=0;
			s=s+(unit[0][0]*grid[((x-1)+3)%wh][((y-1)+3)%wh]);
			s=s+(unit[1][0]*grid[((x-0)+3)%wh][((y-1)+3)%wh]);
			s=s+(unit[2][0]*grid[((x+1)+3)%wh][((y-1)+3)%wh]);

			s=s+(unit[0][1]*grid[((x-1)+3)%wh][((y+0)+3)%wh]);
			s=s+(unit[1][1]*grid[((x-0)+3)%wh][((y+0)+3)%wh]);
			s=s+(unit[2][1]*grid[((x+1)+3)%wh][((y+0)+3)%wh]);

			s=s+(unit[0][2]*grid[((x-1)+3)%wh][((y+1)+3)%wh]);
			s=s+(unit[1][2]*grid[((x-0)+3)%wh][((y+1)+3)%wh]);
			s=s+(unit[2][2]*grid[((x+1)+3)%wh][((y+1)+3)%wh]);

			// The Activation
			if(Math.round(Math.abs(s))==3 ||  Math.round(Math.abs(s))==11  || Math.round(Math.abs(s))==12){
				//gridx[((x-0)+3)%wh][((y+0)+3)%wh]=1;
			}
			else{
				//gridx[((x-0)+3)%wh][((y+0)+3)%wh]=0;
			}

			gridx[((x-0)+3)%wh][((y+0)+3)%wh]=-1/(.9*Math.pow(s,2)+1)+1;

		}

	}

	grid=gridx;

}

var can=document.getElementById('canvas');
var ctx=can.getContext('2d');
var pixels=ctx.getImageData(0,0,512,512);
function disp(){
ctx.clearRect(0,0,512,512);
	s="<table style='width:100%;height:100%' border=0 cellspacing=0 cellpadding=0>";
	tel=0;
	for(x=0;x<(wh-0);x++){
		//s=s+"<tr>";
		for(y=0;y<(wh-0);y++){
			offset=4*tel;
			tel++;
			v=grid[x][y];
			if(v<.5){
			//	s=s+"<td> </td>";
				w=255;
			}
			else{
			//	s=s+"<td style='background-color:black'> </td>";
				w=0;
			}

			w=Math.max(0, Math.min((Math.abs(v)*255), 255))



			pixels.data[offset]=w;
			pixels.data[offset+1]=w;
			pixels.data[offset+2]=w;
			pixels.data[offset+3]=255;

		}
	//	s=s+"</tr>";
	}
	//s=s+"</table>";
	//document.getElementById('div').innerHTML=s;
	ctx.putImageData(pixels,0,0);
}

function loop(){
	conv();
	conv();
	disp();
	//setTimeout("loop()", 5);
setTimeout("loop()", (2*lays));
}
loop();

</script>
