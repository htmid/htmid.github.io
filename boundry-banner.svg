<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0066"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#33ffcc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="#050510"/>
  <rect x="10" y="10" width="780" height="180" rx="16" ry="16"
        fill="none" stroke="url(#grad)" stroke-width="3"/>
  <text x="50%" y="45%" text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" fill="#f5f5f5">
    I will never forget.
  </text>
  <text x="50%" y="70%" text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" fill="#bbbbbb">
    My boundaries stay closed to those who harm me.
  </text>
</svg>
