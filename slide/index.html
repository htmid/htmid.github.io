<meta name="description" content="Htmid is een app die generatieve muziek maakt en gebruik maakt van wiskundige en natuurkunde concepten om oneindige muziekstreams te creëren in tientallen stijlen. De muziek kan als tekstuele audio noten worden opgeslagen en wordt gezaaid met een willekeurige ingrediënten voor de muziek. Streams kunnen worden samengesteld door aan het eindpunt van de app variabelen van waarde te voorzien. Htmid maakt samenwerking tussen muziekliefhebbers eenvoudig, stimuleert en bevordert creativiteit. De app biedt verschillende functies, zoals het afspelen verdeeld over verschillende apparaten en een synchronisatiemechanisme dat lijkt op een zendstation maar er niet is"/>

function b64toBlob(b64Data, contentType, sliceSize){ contentType = contentType || '';
  sliceSize = sliceSize || 512;
  var byteCharacters = atob(b64Data);
  var byteArrays = [];
  for (var offset = 0; offset < byteCharacters.length; offset += sliceSize){
    var slice = byteCharacters.slice(offset, offset + sliceSize);
    var byteNumbers = new Array(slice.length);
    for (var i = 0; i < slice.length; i++){
      byteNumbers[i] = slice.charCodeAt(i);
    }
    var byteArray = new Uint8Array(byteNumbers);
    byteArrays.push(byteArray);
  }
  var blob = new Blob(byteArrays, {type: contentType});
  return blob;
}
