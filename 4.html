
<div style='width:100%;height:100%;background-image:url(https://th.bing.com/th/id/R.47e2b37e235b73a6294baffdb62bad9f?rik=fvTXxzt4jwNp4g&amp;riu=http%3a%2f%2fwww.wainwrightroutes.co.uk%2fimages2%2fnwf03_r2_51.jpg&amp;ehk=6U1uV9fEoM0aTj6Oew%2fBfzRJu3MzybUD2uUrMWFv%2fvg%3d&amp;risl=&amp;pid=ImgRaw&amp;r=0);background-size:100% 100%'>
<canvas id="c" width="200" height="158" style='width:100%;height:100%'></canvas>
<script>

var t=0;
function anim(){


    // Save the state, so we can undo the clipping
    ctx.save();
    
    
    // Create a shape, of some sort
    ctx.beginPath();

xx=(200/2);
yy=158/2;	

    ctx.moveTo(xx, yy);
for(i=0;i<t;i++){
xp=xx+(xx*2*Math.cos(Math.PI*2*i/100));
yp=yy+(yy*2*Math.sin(Math.PI*2*i/100));
 ctx.lineTo(xp, yp);
}
    ctx.moveTo(xx, yy);
    ctx.closePath();
    // Clip to the current path
    ctx.clip();
    
    
    ctx.drawImage(img, 0, 0);
    
    // Undo the clipping
    ctx.restore();
t++;
setTimeout("anim()", 200);

}
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');



// Create an image element
var img = document.createElement('IMG');

// When the image is loaded, draw it
img.onload = function () {

anim();
}

// Specify the src to load the image
img.src = "http://i.imgur.com/gwlPu.jpg";







</script>
